<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo de Pagamento — EiP Idiomas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f4f4f2;
    color: #1a1a1a;
    padding: 2rem 1rem;
  }

  .page {
    background: #fff;
    max-width: 780px;
    margin: 0 auto;
    border-radius: 12px;
    border: 1px solid #e0e0e0;
    padding: 2.5rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 1.25rem;
    border-bottom: 2.5px solid #A32D2D;
    margin-bottom: 1.5rem;
  }
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-circle {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: #A32D2D;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
    letter-spacing: 0.03em;
  }
  .school-name { font-size: 18px; font-weight: 600; color: #1a1a1a; }
  .school-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .doc-info { text-align: right; }
  .doc-info h2 {
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: #A32D2D; margin-bottom: 4px;
  }
  .doc-info p { font-size: 12px; color: #888; }

  /* SUMMARY BAR */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .metric {
    background: #fafafa;
    border: 1px solid #ebebeb;
    border-radius: 8px;
    padding: 12px 14px;
  }
  .metric-label {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: #999; margin-bottom: 5px;
  }
  .metric-value {
    font-size: 16px; font-weight: 600; color: #1a1a1a;
  }
  .metric-value.destaque { font-size: 22px; color: #A32D2D; }

  /* TABLE */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
    table-layout: fixed;
  }
  thead tr { background: #A32D2D; }
  thead th {
    padding: 9px 10px;
    font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.05em;
    color: #fff; text-align: left;
  }
  thead th.right { text-align: right; }
  thead th.center { text-align: center; }
  tbody tr:nth-child(even) { background: #fafafa; }
  tbody tr:hover { background: #FFF0F0; }
  td {
    padding: 7px 10px;
    color: #1a1a1a;
    border-bottom: 1px solid #f0f0f0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  td.right { text-align: right; }
  td.center { text-align: center; }
  .col-desc { width: 40%; }
  .col-data { width: 9%; }
  .col-turma { width: 23%; }
  .col-pres { width: 9%; }
  .col-valor { width: 11%; }
  .col-idx { width: 5%; color: #bbb; font-size: 11px; }

  /* BADGES */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }
  .badge-P  { background: #e8f5e9; color: #2e7d32; }
  .badge-F  { background: #ffebee; color: #b71c1c; }
  .badge-R  { background: #fff8e1; color: #f57f17; }
  .badge-CP { background: #e3f2fd; color: #1565c0; }
  .badge-default { background: #f5f5f5; color: #555; }

  /* FOOTER */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid #ebebeb;
  }
  .footer-counts { font-size: 12px; color: #888; line-height: 1.8; }
  .footer-counts strong { color: #1a1a1a; }
  .footer-nota {
    font-size: 11px; color: #bbb;
    font-style: italic; text-align: right;
    max-width: 300px;
  }

  /* PRINT BUTTON */
  .print-area {
    text-align: center;
    margin-top: 1.5rem;
  }
  .btn-print {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 24px;
    background: #A32D2D; color: #fff;
    border: none; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.03em;
    transition: background 0.15s;
  }
  .btn-print:hover { background: #791F1F; }
  .btn-print svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ERROR */
  .error-box {
    background: #fff3f3; border: 1px solid #f5c6c6;
    border-radius: 8px; padding: 1.5rem;
    color: #a32d2d; font-size: 14px; line-height: 1.7;
    text-align: center;
  }

  /* PRINT STYLES */
  @media print {
    body { background: #fff; padding: 0; }
    .page { box-shadow: none; border: none; border-radius: 0; padding: 1.5rem; }
    .print-area { display: none; }
    thead tr { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .metric { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div class="page">
  <div id="conteudo"></div>
</div>
<div class="print-area" id="print-area" style="display:none;">
  <button class="btn-print" onclick="window.print()">
    <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    Imprimir / Salvar como PDF
  </button>
</div>

<script>
  function getParam(name) {
    const url = new URLSearchParams(window.location.search);
    return url.get(name) || '';
  }

  function badgeClass(pres) {
    const map = { P: 'badge-P', F: 'badge-F', R: 'badge-R', CP: 'badge-CP' };
    return map[pres] || 'badge-default';
  }

  function formatBRL(val) {
    const n = parseFloat(val) || 0;
    return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  function hoje() {
    return new Date().toLocaleDateString('pt-BR');
  }

  function render() {
    const teacher   = getParam('teacher')   || '—';
    const periodo   = getParam('periodo')   || '—';
    const totalVal  = getParam('totalValor')|| '0';
    let aulasTotal = 0;
    let aulasNao = 0;
    let aulasConsid = 0;

    // aulas = JSON array: [{desc, data, turma, pres, valor}, ...]
    let aulas = [];
    try {
      const raw = getParam('aulas');
      if (raw && raw !== 'null' && raw !== 'undefined' && raw.trim() !== '') {
        const decoded = decodeURIComponent(raw);
        const parsed = JSON.parse(decoded);
        if (Array.isArray(parsed)) {
          aulas = parsed;
        } else if (parsed && Array.isArray(parsed.aulas)) {
          aulas = parsed.aulas;
        }
      }
    } catch(e) {
      aulas = [];
    }

    // Calcular totais
    aulasTotal = aulas.length;
    aulasNao = aulas.filter(a => a.pres === "CP" || a.pres === "CC" || a.pres === "CS" || a.pres === "Fe").length;
    aulasConsid = aulasTotal - aulasNao;

    if (!getParam('teacher')) {
      document.getElementById('conteudo').innerHTML = `
        <div class="error-box">
          <strong>Nenhum dado encontrado.</strong><br>
          Este documento precisa ser aberto com os parâmetros corretos via FlutterFlow.<br><br>
          <span style="font-size:12px; color:#888;">Exemplo de URL:<br>
          <code>recibo_professor_eip.html?teacher=Nome&periodo=Dez/2025&totalValor=2525&aulasTotal=78&aulasNao=15&aulas=[...]</code>
          </span>
        </div>`;
      return;
    }

    const linhas = aulas.map((a, i) => `
      <tr>
        <td class="col-idx center">${i + 1}</td>
        <td class="col-desc" title="${a.desc || ''}">${a.desc || '—'}</td>
        <td class="col-data">${a.data || '—'}</td>
        <td class="col-turma" title="${a.turma || ''}">${a.turma || '—'}</td>
        <td class="col-pres center"><span class="badge ${badgeClass(a.pres)}">${a.pres || '—'}</span></td>
        <td class="col-valor right">${formatBRL(a.valor)}</td>
      </tr>
    `).join('');

    document.getElementById('conteudo').innerHTML = `
      <div class="header">
        <div class="logo-area">
          <div class="logo-circle">EiP</div>
          <div>
            <div class="school-name">EiP Idiomas</div>
            <div class="school-sub">Relatório de Pagamento de Professor</div>
          </div>
        </div>
        <div class="doc-info">
          <h2>Pagamento de Professor</h2>
          <p>Gerado em ${hoje()}</p>
        </div>
      </div>

      <div class="summary-bar">
        <div class="metric">
          <div class="metric-label">Professor</div>
          <div class="metric-value">${teacher}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Período</div>
          <div class="metric-value">${periodo}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Valor a receber</div>
          <div class="metric-value destaque">${formatBRL(totalVal)}</div>
        </div>
      </div>

      <table>
        <colgroup>
          <col class="col-idx">
          <col class="col-desc">
          <col class="col-data">
          <col class="col-turma">
          <col class="col-pres">
          <col class="col-valor">
        </colgroup>
        <thead>
          <tr>
            <th class="center">#</th>
            <th>Conteúdo</th>
            <th>Data</th>
            <th>Turma</th>
            <th class="center">Pres.</th>
            <th class="right">Valor</th>
          </tr>
        </thead>
        <tbody>
          ${linhas || '<tr><td colspan="6" style="text-align:center;color:#bbb;padding:1.5rem;">Nenhuma aula encontrada.</td></tr>'}
        </tbody>
      </table>

      <div class="footer">
        <div class="footer-counts">
          Total de aulas no período: <strong>${aulasTotal}</strong> &nbsp;|&nbsp;
          Não consideradas: <strong>${aulasNao}</strong> &nbsp;|&nbsp;
          Consideradas: <strong>${aulasConsid}</strong>
        </div>
        <div class="footer-nota">
          Documento gerado pelo sistema EiP Idiomas.<br>
          Valores refletem o cálculo registrado na data de geração.
        </div>
      </div>
    `;

    document.getElementById('print-area').style.display = 'block';
  }

  render();
</script>
</body>
</html>
